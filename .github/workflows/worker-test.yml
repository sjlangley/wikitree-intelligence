name: Worker Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - '!apps/worker/*.md'
      - '!apps/worker/**/*.md'
      - '.github/workflows/worker-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - '!apps/worker/*.md'
      - '!apps/worker/**/*.md'
      - '.github/workflows/worker-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'apps/worker/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest -v --cov=src --cov-report=xml:./apps/worker/coverage.xml

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./apps/worker/coverage.xml
          flags: worker
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
