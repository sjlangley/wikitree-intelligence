name: UI CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - '!apps/ui/*.md'
      - '!apps/ui/**/*.md'
      - '.github/workflows/ci-ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - '!apps/ui/*.md'
      - '!apps/ui/**/*.md'
      - '.github/workflows/ci-ui.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: apps/ui/coverage/lcov.info
          flags: ui
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

