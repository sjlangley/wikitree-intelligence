name: UI Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - '!apps/ui/*.md'
      - '!apps/ui/**/*.md'
      - '.github/workflows/ui-docker-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ui/**'
      - '!apps/ui/*.md'
      - '!apps/ui/**/*.md'
      - '.github/workflows/ui-docker-build.yml'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: apps/ui
          push: false
          load: true
          tags: ui:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker container
        run: |
          docker run -d --name ui-test \
            --network host \
            --memory 512m \
            --cpus 1 \
            ui:test

      - name: Wait for application to start
        run: |
          echo "Waiting for application to start..."
          max_attempts=60
          attempt=0
          sleep_duration=1

          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s --max-time 5 --retry 2 --retry-delay 1 http://localhost:3000 > /dev/null 2>&1; then
              echo "Application is running!"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Application not ready yet..."
            sleep $sleep_duration

            # Exponential backoff: increase sleep duration after first 10 attempts
            if [ $attempt -eq 10 ] || [ $attempt -eq 20 ]; then
              sleep_duration=$((sleep_duration + 1))
              echo "Increasing retry interval to ${sleep_duration}s"
            fi
          done
          echo "Application did not start within timeout"
          exit 1

      - name: Check container logs
        if: always()
        run: docker logs ui-test

      - name: Stop container
        if: always()
        run: docker stop ui-test && docker rm ui-test